<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piratbukten - iPad Huvudskärm</title>
    <!-- Läs in Supabase-biblioteket -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0b132b;
            background-image: radial-gradient(circle at 50% 25%, #1c2541 0%, #0b132b 80%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .board-container {
            width: 100%;
            max-width: 700px;
            background: rgba(28, 37, 65, 0.6);
            border: 2px solid #48cae4;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        h1 { color: #48cae4; text-transform: uppercase; letter-spacing: 3px; font-size: 2.5rem; margin-bottom: 5px; }
        .room-badge { background: #ff3344; color: white; padding: 6px 16px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 30px; letter-spacing: 1px; }
        .dice-display { font-size: 5rem; font-weight: bold; color: #ffb703; text-shadow: 0 0 20px rgba(255, 183, 3, 0.4); margin: 20px 0; }
        .event-card { background: rgba(0,0,0,0.3); border-left: 5px solid #ff3344; border-radius: 12px; padding: 25px; text-align: left; margin-top: 30px; }
        .event-title { font-size: 1.5rem; font-weight: bold; color: #ff3344; margin-bottom: 8px; }
        .event-desc { font-size: 1.1rem; color: #e0e1dd; line-height: 1.5; }
        .status-text { font-size: 0.9rem; color: #64dfdf; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="board-container">
        <h1>🏴‍☠️ Piratbukten</h1>
        <div class="room-badge">RUMSKOD: PIRAT</div>
        
        <p style="color: #a5a5a5; font-size: 1.1rem;">Senaste tärningsslaget</p>
        <div id="dice-total" class="dice-display">-</div>

        <div class="event-card">
            <div id="event-title" class="event-title">Väntar på kaptenen...</div>
            <div id="event-desc" class="event-desc">Logga in på mobilen med koden ovan för att styra skutan och slå tärningarna.</div>
        </div>
        
        <div id="status" class="status-text">Ansluter till marinradarn...</div>
    </div>

    <script>
        // 1. BYT UT DESSA MOT DINA EGNA SUPABASE-UPPGIFTER
        const supabaseUrl = 'https://vyyubyujhyljrwamdbmc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5eXVieXVqaHlsanJ3YW1kYm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjYyMTcsImV4cCI6MjA5ODk0MjIxN30.efX8kjRFPFmA0JPkWcw4ZOs-inMAz47eckf8shVNuaM';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const roomId = 'PIRAT';

        async function initBoard() {
            // Skapa rummet i databasen om det inte redan finns
            const { data, error } = await supabase
                .from('pirate_rooms')
                .upsert({ id: roomId }, { onConflict: 'id' });

            document.getElementById('status').innerText = "⚓ Synkad mot molnet! Klar att spela.";

            // Lyssna på ändringar i realtid för vårt rum
            supabase
                .channel('room-changes')
                .on('postgres_changes', { event: 'UPDATE', filter: `id=eq.${roomId}`, schema: 'public', table: 'pirate_rooms' }, payload => {
                    const room = payload.new;
                    document.getElementById('dice-total').innerText = room.dice_total === 0 ? "-" : room.dice_total;
                    document.getElementById('event-title').innerText = room.current_event;
                    document.getElementById('event-desc').innerText = room.event_desc;
                })
                .subscribe();
        }

        initBoard();
    </script>
</body>
</html>
