<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piratbukten - Kaptenspanel</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0b132b;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .mobile-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #ff3344; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; width: 100%; }
        input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border-radius: 12px;
            border: 2px solid #1c2541;
            background: #1c2541;
            color: white;
            text-align: center;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        button {
            width: 100%;
            background: #ff3344;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 51, 68, 0.3);
            margin-top: 10px;
        }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
        .card { background: rgba(28, 37, 65, 0.6); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        
        /* Felsökningslåda */
        #debug-box {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid #ff3344;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            color: #ff9999;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <div id="login-view">
            <h2>Ange Rumskod</h2>
            <div class="input-group">
                <input type="text" id="room-code-input" placeholder="SKRIV PIRAT" autocomplete="off">
            </div>
            <button onclick="loginToRoom()">Logga in på skutan</button>
        </div>

        <div id="control-view" class="hidden">
            <h2>Kaptenspanel 🏴‍☠️</h2>
            <p style="color: #64dfdf; margin-bottom: 20px;">Ansluten till rummet!</p>
            
            <button onclick="rollPirateDice()" style="background: #ffb703; color: #0b132b; box-shadow: 0 4px 15px rgba(255, 183, 3, 0.3);">🎲 Slå tärningar &amp; händelse</button>
            
            <div class="card">
                <p style="margin-bottom: 0; font-size: 0.9rem; color: #a5a5a5;">Ditt dolda piratuppdrag:</p>
                <p style="font-weight: bold; margin-top: 8px; color: #48cae4;">Smuggla lera: Äg en hamn och ha 3 lerkort på handen samtidigt för att få +1 poäng vid spelets slut.</p>
            </div>
        </div>

        <div id="debug-box">Systemstatus: Väntar på inloggning...</div>

    </div>

    <script>
        // Felsökningsfunktion
        function logDebug(msg, isError = false) {
            const box = document.getElementById('debug-box');
            if (isError) {
                box.style.background = "rgba(255, 0, 0, 0.3)";
                box.innerHTML = "<strong>FEL:</strong> " + msg;
            } else {
                box.innerHTML = "Status: " + msg;
            }
        }

        // Catcha globala fel automatiskt
        window.onerror = function(message, source, lineno, colno, error) {
            logDebug(message + " (Rad " + lineno + ")", true);
            return false;
        };

        // 1. KLISTRA IN DINA UPPGIFTER HÄR (Se till att avsluta URL med .co)
const supabaseUrl = 'https://test.supabase.co';
const supabaseKey = '12345';
        
        let supabase = null;
        let activeRoom = '';

        // Initiera Supabase säkert
        try {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabase = supabase.createClient(supabaseUrl, supabaseKey);
                logDebug("Supabase-klienten laddad. Redo för inloggning.");
            } else {
                // Om unpkg används istället för jsdelivr ligger det ibhand under fönsterobjektet
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                logDebug("Supabase-klienten laddad via reservmetod.");
            }
        } catch(e) {
            logDebug("Kunde inte starta Supabase. Kolla dina nycklar och citattecken! " + e.message, true);
        }

        function loginToRoom() {
            logDebug("Försöker logga in...");
            const input = document.getElementById('room-code-input').value.trim().toUpperCase();
            
            if (!supabase) {
                logDebug("Kan inte logga in eftersom Supabase-anslutningen saknas.", true);
                return;
            }

            if (input === 'PIRAT') {
                activeRoom = input;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('control-view').classList.remove('hidden');
                logDebug("Inloggad i rummet PIRAT. Väntar på tärningsslag.");
            } else {
                logDebug("Fel rumskod angiven. Skriv PIRAT.", true);
            }
        }

        const piratEvents = [
            { title: "⚓ Stiltje på havet", desc: "Ingen vind i seglen! Spelare får inte handla med banken eller hamnar under denna runda." },
            { title: "🌊 Stormvarning!", desc: "En plötslig storm drar in. Alla spelare som har bosättningar eller städer intill ett havsfält måste slumpmässigt slänga 1 råvarukort." },
            { title: "💰 Kunglig tullrabatt", desc: "Tullarna tar helg! Under denna runda kostar det bara 2:1 att byta bort valfri råvara hos banken." }
        ];

        async function rollPirateDice() {
            logDebug("Rullar tärningar...");
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const total = d1 + d2;

            let eventTitle = "Vanligt väder";
            let eventDesc = `Råvaror delas ut som vanligt för nummer ${total}.`;

            if (total === 7) {
                eventTitle = "🏴‍☠️ PIRATERNA ANFALLER! (7)";
                eventDesc = "Flytta rövaren/piraten till ett nytt fält. Alla kaptener med fler än 7 kort på handen tvingas slänga hälften i sjön!";
            } else if (Math.random() < 0.4) {
                const randomEv = piratEvents[Math.floor(Math.random() * piratEvents.length)];
                eventTitle = randomEv.title;
                eventDesc = randomEv.desc;
            }

            logDebug(`Slog ${total}. Skickar till databasen...`);

            try {
                const { error } = await supabase
                    .from('pirate_rooms')
                    .update({ 
                        dice_total: total, 
                        current_event: eventTitle, 
                        event_desc: eventDesc 
                    })
                    .eq('id', activeRoom);
                    
                if(error) {
                    logDebug("Databasfel: " + error.message, true);
                } else {
                    logDebug(`Lyckades! Skickade tärningssumma ${total} till iPaden.`);
                }
            } catch(e) {
                logDebug("Nätverksfel eller databaskrasch: " + e.message, true);
            }
        }
    </script>
</body>
</html>
