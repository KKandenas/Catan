<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catan: Meteor Impact</title>
    <style>
        :root {
            --space-bg: #060913;
            --radar-green: #00ff66;
            --alert-red: #ff3333;
            --panel-blue: #111a2e;
            --text-color: #33e1ff;
            --border-color: #1f355e;
            --gold-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--space-bg);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        header {
            background-color: var(--panel-blue);
            padding: 10px 20px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 225, 255, 0.2);
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .handbook-btn {
            color: var(--gold-color);
            border: 1px solid var(--gold-color);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .control-room {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 55px);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            overflow: hidden;
        }

        .sci-fi-box {
            background-color: rgba(17, 26, 46, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(31, 53, 94, 0.5);
        }

        .flex-grow { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .radar-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .radar-screen {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            position: relative;
            background: radial-gradient(circle, #0c162b 0%, #050811 100%);
            box-shadow: 0 0 40px rgba(31, 53, 94, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0, 255, 102, 0.15) 0%, transparent 50%);
            transform-origin: center;
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radar-grid {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 1px dashed rgba(31, 53, 94, 0.6);
            border-radius: 50%;
        }
        .radar-grid-inner {
            position: absolute;
            width: 40%;
            height: 40%;
            border: 1px dashed rgba(31, 53, 94, 0.4);
            border-radius: 50%;
        }

        .meteor-dot {
            position: absolute;
            width: 22px;
            height: 22px;
            background-color: var(--alert-red);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--alert-red);
            transition: all 1s ease-out;
            z-index: 10;
        }

        .distance-display {
            text-align: center;
            margin-top: 15px;
        }
        .distance-val {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .dice-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }
        .die {
            width: 50px;
            height: 50px;
            background-color: var(--panel-blue);
            border: 2px solid var(--text-color);
            color: #fff;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .btn {
            background-color: #1f355e;
            color: #fff;
            border: 1px solid var(--text-color);
            padding: 10px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        .btn:active { background-color: var(--panel-blue); }
        .btn-alert { background-color: var(--alert-red); border-color: #ff6666; }

            flex: 1;
            font-family: monospace;
            font-size: 0.85
